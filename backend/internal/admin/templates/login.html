{{define "login.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; font-size: 14px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 2rem; width: 340px; }
h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }
.field { margin-bottom: 1rem; }
label { display: block; font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 0.3rem; }
input { width: 100%; padding: 0.5rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: inherit; }
input:focus { outline: none; border-color: #111; }
button { width: 100%; padding: 0.55rem; background: #111; color: #fff; border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer; margin-top: 0.5rem; font-family: inherit; }
button:hover { background: #333; }
.error { background: #fff0f0; border: 1px solid #fcc; color: #c00; padding: 0.5rem 0.75rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="card">
  <h1>Admin Login</h1>
  {{if .error}}<div class="error">{{.error}}</div>{{end}}
  <form method="POST" action="/admin/login">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Log in</button>
  </form>
</div>
</body>
</html>
{{end}}
