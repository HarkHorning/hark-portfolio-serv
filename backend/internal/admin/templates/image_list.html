{{define "image_list.html"}}
{{template "image_list_inner" .}}
{{end}}

{{define "image_list_inner"}}
{{$artID := .ArtID}}
{{$images := .Images}}
{{$displayIDs := .DisplayImageIDs}}
{{if $images}}
<div class="image-grid">
  {{range $images}}
  <div class="image-thumb">
    <img src="{{.URL}}" alt="{{.Filename}}">
    <span class="variant-label">{{.Variant}}</span>
    <label class="display-check">
      <input type="checkbox" name="display_image_ids" value="{{.Id}}"
        {{if contains $displayIDs .Id}}checked{{end}}>
      Show
    </label>
    <form hx-post="/admin/art/{{$artID}}/images/{{.Id}}/delete"
          hx-target="#image-list"
          hx-swap="innerHTML"
          hx-confirm="Delete this image?">
      <button type="submit" class="del">✕</button>
    </form>
  </div>
  {{end}}
</div>
<button type="button"
        hx-post="/admin/art/{{$artID}}/display-images"
        hx-include="[name='display_image_ids']"
        hx-target="#image-list"
        hx-swap="innerHTML"
        class="btn btn-primary"
        style="margin-top:1rem;">
  Save Display Selection
</button>
{{else}}
<p style="color:#888;font-size:0.85rem;">No images uploaded yet.</p>
{{end}}
{{end}}
