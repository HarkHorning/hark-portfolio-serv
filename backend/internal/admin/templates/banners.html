{{define "content"}}
<div class="page-actions">
  <h1>Banners</h1>
</div>

<div class="form-card" style="margin-bottom:2rem;">
  <h2>Add Banner</h2>
  <form method="POST" action="/admin/banners" style="margin-top:0.75rem;display:flex;gap:0.75rem;align-items:flex-end;">
    <div class="field" style="flex:1;margin-bottom:0;">
      <label>Artwork</label>
      <select name="art_tile_id" required>
        <option value="">— Select artwork —</option>
        {{range .Arts}}
        <option value="{{.Id}}">{{.Title}}</option>
        {{end}}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Add</button>
  </form>
</div>

{{if .Banners}}
<table class="data-table">
  <thead>
    <tr>
      <th>Preview</th>
      <th>Title</th>
      <th>Order</th>
      <th>Active</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {{range .Banners}}
    <tr>
      <td><img src="{{.DisplayURL}}" style="height:60px;width:120px;object-fit:cover;border-radius:4px;"></td>
      <td style="font-size:0.9rem;">{{.Title}}</td>
      <td>
        <form method="POST" action="/admin/banners/{{.Id}}/order" style="display:flex;gap:0.5rem;align-items:center;">
          <input type="number" name="sort_order" value="{{.SortOrder}}" style="width:60px;" class="inline-input">
          <button type="submit" class="btn btn-sm">Set</button>
        </form>
      </td>
      <td>
        <form method="POST" action="/admin/banners/{{.Id}}/toggle">
          {{if .Active}}
            <input type="hidden" name="active" value="false">
            <button type="submit" class="btn btn-sm">Deactivate</button>
          {{else}}
            <input type="hidden" name="active" value="true">
            <button type="submit" class="btn btn-sm btn-primary">Activate</button>
          {{end}}
        </form>
      </td>
      <td>
        <form method="POST" action="/admin/banners/{{.Id}}/delete"
              onsubmit="return confirm('Remove this banner?')">
          <button type="submit" class="btn btn-sm btn-danger">Remove</button>
        </form>
      </td>
    </tr>
    {{end}}
  </tbody>
</table>
{{else}}
<p style="color:#888;font-size:0.9rem;">No banners yet. Add one above.</p>
{{end}}
{{end}}
