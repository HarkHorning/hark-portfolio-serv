{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Hark Horning</title>
<script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; color: #111; background: #f9f9f9; }
a { color: #111; text-decoration: none; }
a:hover { text-decoration: underline; }

nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; height: 48px; }
nav .brand { font-weight: 600; letter-spacing: 0.04em; color: #111; }
nav a { color: #666; font-size: 0.85rem; }
nav a:hover, nav a.active { color: #111; text-decoration: none; }
nav .spacer { flex: 1; }
nav form { display: inline; }
nav button { background: none; border: none; color: #666; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
nav button:hover { color: #111; }

main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; }
h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #444; }

.btn { display: inline-block; padding: 0.4rem 1rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.85rem; font-family: inherit; color: #111; }
.btn:hover { background: #f0f0f0; text-decoration: none; }
.btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-primary:hover { background: #333; }
.btn-danger { background: #fff; color: #c00; border-color: #f5c6c6; }
.btn-danger:hover { background: #fff0f0; }
.btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
.inline-input { padding: 0.25rem 0.4rem; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 0.85rem; }
.btn-primary:hover { background: #333; color: #fff; }
.btn-danger { background: #fff; color: #c00; border-color: #c00; }
.btn-danger:hover { background: #fff0f0; }
.btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }

table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e5e5; border-radius: 6px; overflow: hidden; }
th { background: #f5f5f5; text-align: left; padding: 0.6rem 1rem; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #666; border-bottom: 1px solid #e5e5e5; }
td { padding: 0.65rem 1rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }

.form-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 6px; padding: 1.5rem; max-width: 640px; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.03em; }
.field input[type=text], .field input[type=number], .field textarea, .field select { width: 100%; padding: 0.45rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: inherit; }
.field textarea { min-height: 80px; resize: vertical; }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: #111; }
.field-row { display: flex; gap: 1rem; }
.field-row .field { flex: 1; }
.checkbox-row { display: flex; align-items: center; gap: 0.5rem; }
.checkbox-row input { width: auto; }

.error-msg { background: #fff0f0; border: 1px solid #fcc; color: #c00; padding: 0.6rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.85rem; }
.success-msg { background: #f0fff4; border: 1px solid #9de; color: #050; padding: 0.6rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.85rem; }

.page-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.image-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 0.75rem; }
.image-thumb { position: relative; width: 100px; border: 1px solid #e5e5e5; border-radius: 4px; overflow: hidden; }
.image-thumb img { width: 100%; height: 100px; object-fit: cover; display: block; }
.image-thumb .del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 3px; cursor: pointer; font-size: 0.7rem; padding: 1px 5px; font-family: inherit; }
.variant-label { position: absolute; bottom: 22px; left: 2px; background: rgba(0,0,0,0.55); color: #fff; font-size: 0.65rem; padding: 1px 4px; border-radius: 2px; }
.display-check { display: flex; align-items: center; gap: 0.3rem; padding: 2px 4px; font-size: 0.7rem; color: #555; background: #f5f5f5; border-top: 1px solid #e5e5e5; cursor: pointer; }

.upload-area { border: 2px dashed #ccc; border-radius: 6px; padding: 1.5rem; text-align: center; color: #888; font-size: 0.85rem; margin-top: 0.75rem; }
.upload-area:hover { border-color: #999; }
.tag { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; background: #f0f0f0; font-size: 0.75rem; color: #555; margin: 0.1rem; }
.sold-badge { background: #fef3c7; color: #92400e; }
.archived-badge { background: #fee2e2; color: #991b1b; }
</style>
</head>
<body>
<nav>
  <span class="brand">Hark Admin</span>
  <a href="/admin/art">Art</a>
  <a href="/admin/prints">Prints</a>
  <a href="/admin/banners">Banners</a>
  <a href="/admin/content">Content</a>
  <a href="/admin/categories">Categories</a>
  <span class="spacer"></span>
  <form method="POST" action="/admin/logout">
    <button type="submit">Log out</button>
  </form>
</nav>
<main>
  {{template "content" .}}
</main>
</body>
</html>
{{end}}
